name: Build Tweak

on:   
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Install ldid
        run: |
          brew install ldid

      # "Generate MIG exception server stubs" và "Dump real arm_thread_state64_set_pc_fptr
      # signature" đã bỏ khỏi đây - cả 2 chỉ phục vụ HWBreakHook.h (Mach exception handler cho
      # hardware breakpoint), mà HWBreakHook.h giờ không còn được import ở đâu trong build nữa
      # (AssetRedirect.h chuyển sang gọi trực tiếp kiểu Monite, không hook - xem AssetRedirect.h
      # PHẦN 3 và Makefile). Giữ 2 bước đó lại sẽ sinh ra Source/Includes/Generated/mach_excServer.c
      # nhưng KHÔNG có gì biên dịch/dùng tới, tốn thời gian CI vô ích - không phải lỗi build.

      - name: Build with Theos
        run: |
          make clean
          make package

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: tweak-deb
          path: |
            *.deb
            packages/*.deb
            .theos/_/*.deb
